services:
  - type: web
    name: opportulearn
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn OpportuLearn.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: OpportuLearn.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: 'False'